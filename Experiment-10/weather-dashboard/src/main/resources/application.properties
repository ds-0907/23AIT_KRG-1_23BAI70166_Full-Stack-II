# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/weather_dashboard
spring.datasource.username=weatheruser
spring.datasource.password=weatherpass
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OpenWeatherMap API
weather.api.key=d3c6a3e465b0e9d6ef0335145374797b
weather.api.url=https://api.openweathermap.org/data/2.5

# Server
server.port=${PORT:8080}

# Disable Thymeleaf
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.thymeleaf.ThymeleafAutoConfiguration

# JWT
jwt.secret=my-super-secret-key-that-is-at-least-32-chars-long

logging.level.org.springframework.security=DEBUG

